[Background]
; Path to background image (PNG/JPG/BMP/GIF)
Image=C:\Users\xvsu\Desktop\bg.png

; Scope: 1 = Command Window only, 2 = Entire MATLAB window, 3 = CDP CSS inject (DOM)
Scope=3

; Image opacity (0-100, default: 30)
Opacity=22

; Black dimming overlay (0-100, default: 30)
Dimming=22

; Scale mode: 0=Fit 1=Fill 2=Stretch 3=Center 4=Tile
ScaleMode=3

; Timer refresh interval in ms (50-2000, default: 150)
Speed=150

; CDP debug port (0=auto-detect 9222-9229, used with Scope=3)
CdpPort=9222

; CSS selector for background injection (used with Scope=3)
CdpTarget=#commandWindowWrapper

; HTTP server port for serving images (Scope=3, default: 9221)
HttpPort=9221

; Write debug log to file? 0=Off, 1=On (default: 1)
DebugLog=1